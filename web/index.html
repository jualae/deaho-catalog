<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CERAD CATALOG - 대호상사</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #151718;
      color: #ECEDEE;
      min-height: 100vh;
      overflow-y: auto;
    }

    /* Header */
    .header {
      background: #1e2022;
      padding: 20px 24px;
      text-align: center;
      border-bottom: 1px solid #334155;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-badge {
      display: inline-block;
      background: #1A237E;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 12px;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .header h1 { font-size: 28px; font-weight: 800; letter-spacing: 2px; }
    .header p { font-size: 13px; color: #9BA1A6; margin-top: 4px; }

    /* Loading / Error */
    .loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 60vh; gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #334155; border-top-color: #1A237E;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { text-align: center; padding: 60px 24px; color: #EF4444; font-size: 16px; }

    /* Section */
    .section-title { font-size: 18px; font-weight: 700; padding: 20px 24px 12px; max-width: 1100px; margin: 0 auto; }

    /* Grid - max-width to keep cards compact */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      padding: 0 16px 24px;
      max-width: 1100px;
      margin: 0 auto;
    }
    @media (min-width: 640px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 900px) { .grid { grid-template-columns: repeat(4, 1fr); } }

    /* Card - square-ish */
    .card {
      background: #1e2022;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid #334155;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .card-thumb-area {
      aspect-ratio: 1 / 1;
      overflow: hidden;
      position: relative;
      background: #111;
    }
    .card-thumb-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* Color bar overlay at bottom of image */
    .card-color-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 32px;
      display: flex;
      align-items: center;
      padding: 0 10px;
    }
    .card-color-bar-bg {
      position: absolute;
      inset: 0;
      opacity: 0.9;
    }
    .card-num {
      position: relative;
      z-index: 1;
      background: rgba(0,0,0,0.35);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      width: 20px; height: 20px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-right: 8px;
      flex-shrink: 0;
    }
    .card-name {
      position: relative;
      z-index: 1;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-info { padding: 8px 10px; }
    .card-desc-en {
      font-size: 10px; color: #9BA1A6;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .card-desc {
      font-size: 11px; color: #9BA1A6; margin-top: 2px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-pages { font-size: 10px; color: #687076; margin-top: 4px; }

    /* Viewer Modal */
    .viewer-overlay {
      display: none;
      position: fixed; inset: 0;
      background: #151718;
      z-index: 200;
      flex-direction: column;
    }
    .viewer-overlay.active { display: flex; }
    .viewer-header {
      display: flex; align-items: center;
      padding: 10px 16px;
      background: #1e2022;
      border-bottom: 1px solid #334155;
      gap: 12px; min-height: 50px;
    }
    .viewer-back {
      background: #334155; border: none; color: #ECEDEE;
      font-size: 14px; padding: 8px 16px; border-radius: 8px;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
    }
    .viewer-back:hover { background: #475569; }
    .viewer-title { font-size: 18px; font-weight: 700; }
    .viewer-page-info { margin-left: auto; font-size: 13px; color: #9BA1A6; }

    /* Thumbnail strip */
    .thumb-strip {
      display: flex; gap: 6px; padding: 8px 12px;
      background: #1e2022; overflow-x: auto; scrollbar-width: thin;
      justify-content: center;
    }
    .thumb-strip::-webkit-scrollbar { height: 4px; }
    .thumb-strip::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
    .thumb-item {
      flex-shrink: 0; width: 56px; height: 56px;
      border-radius: 6px; overflow: hidden; cursor: pointer;
      border: 3px solid transparent; opacity: 0.45;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .thumb-item.active { border-color: #FF6B35; opacity: 1; }
    .thumb-item:hover { opacity: 0.75; }
    .thumb-item img { width: 100%; height: 100%; object-fit: cover; }

    /* Main image area */
    .viewer-main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden; user-select: none;
    }
    .viewer-main img {
      max-width: 100%; max-height: 100%; object-fit: contain;
    }
    .nav-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.6); color: #fff; border: none;
      width: 44px; height: 44px; border-radius: 50%;
      font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 10; transition: background 0.2s;
    }
    .nav-btn:hover { background: rgba(0,0,0,0.8); }
    .nav-prev { left: 12px; }
    .nav-next { right: 12px; }
    .heart-btn {
      position: absolute; bottom: 16px; right: 16px;
      background: rgba(0,0,0,0.6); border: none;
      width: 44px; height: 44px; border-radius: 50%;
      font-size: 22px; cursor: pointer; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s;
    }
    .heart-btn:hover { transform: scale(1.1); }

    /* Footer nav */
    .footer-nav {
      display: flex; background: #1e2022;
      border-top: 1px solid #334155; padding: 8px 0;
    }
    .footer-nav a {
      flex: 1; text-align: center; color: #687076;
      text-decoration: none; font-size: 12px; padding: 6px 0;
      transition: color 0.2s; cursor: pointer;
    }
    .footer-nav a.active { color: #1A237E; font-weight: 600; }
    .footer-nav a:hover { color: #ECEDEE; }

    /* Favorites page */
    .favorites-page { display: none; }
    .favorites-page.active { display: block; }
    .catalog-page { display: block; }
    .catalog-page.hidden { display: none; }
    .fav-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; padding: 16px; max-width: 1100px; margin: 0 auto;
    }
    @media (min-width: 640px) { .fav-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 900px) { .fav-grid { grid-template-columns: repeat(6, 1fr); } }
    .fav-item {
      aspect-ratio: 1; border-radius: 8px; overflow: hidden;
      cursor: pointer; position: relative; border: 1px solid #334155;
    }
    .fav-item img { width: 100%; height: 100%; object-fit: cover; }
    .fav-item .fav-badge {
      position: absolute; bottom: 4px; left: 4px;
      background: rgba(0,0,0,0.7); color: #fff;
      font-size: 10px; padding: 2px 6px; border-radius: 4px;
    }
    .empty-fav { text-align: center; padding: 60px 24px; color: #687076; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-badge">CERAD CATALOG</div>
    <h1>CERAD</h1>
    <p>대호상사 · Hair & Murin 전문 미용용품 종합 카탈로그</p>
  </div>

  <!-- Catalog Page -->
  <div id="catalogPage" class="catalog-page">
    <div id="loadingArea" class="loading">
      <div class="spinner"></div>
      <p>카탈로그 로딩 중...</p>
    </div>
    <div id="errorArea" class="error-msg" style="display:none;"></div>
    <div id="contentArea" style="display:none;">
      <div class="section-title">제품 카테고리</div>
      <div id="categoryGrid" class="grid"></div>
    </div>
  </div>

  <!-- Favorites Page -->
  <div id="favoritesPage" class="favorites-page">
    <div class="section-title">즐겨찾기</div>
    <div id="favGrid" class="fav-grid"></div>
    <div id="emptyFav" class="empty-fav" style="display:none;">
      <p style="font-size:48px;margin-bottom:12px;">♡</p>
      <p>즐겨찾기한 이미지가 없습니다.</p>
      <p style="font-size:13px;margin-top:8px;">카테고리에서 이미지를 보면서 하트를 눌러보세요.</p>
    </div>
  </div>

  <!-- Viewer Modal -->
  <div id="viewer" class="viewer-overlay">
    <div class="viewer-header">
      <button class="viewer-back" onclick="closeViewer()">← 목록</button>
      <span id="viewerTitle" class="viewer-title"></span>
      <span id="viewerPageInfo" class="viewer-page-info"></span>
    </div>
    <div id="thumbStrip" class="thumb-strip"></div>
    <div class="viewer-main" id="viewerMain">
      <button class="nav-btn nav-prev" onclick="prevPage()">‹</button>
      <img id="viewerImg" src="" alt="catalog image" />
      <button class="nav-btn nav-next" onclick="nextPage()">›</button>
      <button class="heart-btn" id="heartBtn" onclick="toggleHeart()">♡</button>
    </div>
  </div>

  <!-- Footer Navigation -->
  <div class="footer-nav">
    <a id="navHome" class="active" onclick="showPage('catalog')">🏠 홈</a>
    <a id="navFav" onclick="showPage('favorites')">♥ 즐겨찾기</a>
  </div>

  <script>
    let catalogData = null;
    let currentCategory = null;
    let currentPageIdx = 0; // index within category.pages array
    let favorites = JSON.parse(localStorage.getItem('cerad_favorites_web') || '[]');

    // Get image URL from imageUrls map using page number
    function getImageUrl(pageNum) {
      if (!catalogData || !catalogData.imageUrls) return '';
      return catalogData.imageUrls[String(pageNum)] || '';
    }

    // Fetch catalog data
    async function loadCatalog() {
      try {
        const res = await fetch('/api/trpc/catalog.getData');
        if (!res.ok) throw new Error('API failed');
        const json = await res.json();
        catalogData = json.result?.data?.json || json.result?.data || json;
      } catch (e1) {
        try {
          // Fallback: try S3 directly
          const res = await fetch(catalogData?.imageUrls ? '' : 'https://d2xsxph8kpxj0f.cloudfront.net/310519663337257885/g9FMjJFMH7rkmYiPvT29tr/cerad-catalog/catalog.json');
          if (res.ok) catalogData = await res.json();
          else throw new Error('S3 failed');
        } catch {
          document.getElementById('loadingArea').style.display = 'none';
          document.getElementById('errorArea').style.display = 'block';
          document.getElementById('errorArea').textContent = '카탈로그 데이터를 불러올 수 없습니다.';
          return;
        }
      }

      document.getElementById('loadingArea').style.display = 'none';
      document.getElementById('contentArea').style.display = 'block';
      renderCategories();
    }

    function renderCategories() {
      const grid = document.getElementById('categoryGrid');
      grid.innerHTML = '';
      catalogData.categories.forEach(cat => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => openViewer(cat, 0);

        // Use first page of category as thumbnail
        const firstPageNum = Array.isArray(cat.pages) ? cat.pages[0] : cat.pages;
        const thumbUrl = getImageUrl(firstPageNum);
        const color = cat.color || '#1A237E';
        const pageCount = Array.isArray(cat.pages) ? cat.pages.length : cat.pages;

        card.innerHTML = `
          <div class="card-thumb-area">
            <img src="${thumbUrl}" alt="${cat.name}" loading="lazy" />
            <div class="card-color-bar">
              <div class="card-color-bar-bg" style="background: linear-gradient(90deg, transparent 0%, ${color} 15%, ${color} 85%, transparent 100%);"></div>
              <span class="card-num">${cat.num}</span>
              <span class="card-name">${cat.name}</span>
            </div>
          </div>
          <div class="card-info">
            <div class="card-desc-en">${cat.name_en || ''}</div>
            <div class="card-desc">${cat.desc || ''}</div>
            <div class="card-pages">📄 ${pageCount}페이지</div>
          </div>`;
        grid.appendChild(card);
      });
    }

    // Viewer
    function openViewer(cat, startIdx) {
      currentCategory = cat;
      currentPageIdx = startIdx || 0;
      document.getElementById('viewer').classList.add('active');
      document.getElementById('viewerTitle').textContent = cat.name;
      renderThumbs();
      updateViewer();
    }

    function closeViewer() {
      document.getElementById('viewer').classList.remove('active');
      currentCategory = null;
    }

    function getCatPages() {
      return Array.isArray(currentCategory.pages) ? currentCategory.pages : [];
    }

    function renderThumbs() {
      const strip = document.getElementById('thumbStrip');
      strip.innerHTML = '';
      const pages = getCatPages();
      pages.forEach((pageNum, i) => {
        const thumb = document.createElement('div');
        thumb.className = 'thumb-item' + (i === currentPageIdx ? ' active' : '');
        thumb.innerHTML = `<img src="${getImageUrl(pageNum)}" alt="page ${pageNum}" loading="lazy" />`;
        thumb.onclick = () => { currentPageIdx = i; updateViewer(); };
        strip.appendChild(thumb);
      });
    }

    function updateViewer() {
      const pages = getCatPages();
      const pageNum = pages[currentPageIdx];
      const img = document.getElementById('viewerImg');
      img.src = getImageUrl(pageNum);
      document.getElementById('viewerPageInfo').textContent =
        `${currentPageIdx + 1} / ${pages.length}`;

      // Update thumbs
      document.querySelectorAll('.thumb-item').forEach((el, i) => {
        el.className = 'thumb-item' + (i === currentPageIdx ? ' active' : '');
      });
      const activeThumb = document.querySelector('.thumb-item.active');
      if (activeThumb) activeThumb.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });

      updateHeartBtn();
    }

    function prevPage() {
      if (currentPageIdx > 0) { currentPageIdx--; updateViewer(); }
    }
    function nextPage() {
      const pages = getCatPages();
      if (currentPageIdx < pages.length - 1) { currentPageIdx++; updateViewer(); }
    }

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (!currentCategory) return;
      if (e.key === 'ArrowLeft') prevPage();
      if (e.key === 'ArrowRight') nextPage();
      if (e.key === 'Escape') closeViewer();
    });

    // Swipe support
    let touchStartX = 0;
    document.getElementById('viewerMain').addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
    });
    document.getElementById('viewerMain').addEventListener('touchend', e => {
      const diff = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(diff) > 50) {
        if (diff > 0) prevPage(); else nextPage();
      }
    });

    // Favorites
    function getPageId(catId, pageNum) { return catId + '_' + pageNum; }
    function isFav(catId, pageNum) { return favorites.includes(getPageId(catId, pageNum)); }

    function toggleHeart() {
      if (!currentCategory) return;
      const pages = getCatPages();
      const pageNum = pages[currentPageIdx];
      const id = getPageId(currentCategory.id, pageNum);
      const idx = favorites.indexOf(id);
      if (idx >= 0) favorites.splice(idx, 1);
      else favorites.push(id);
      localStorage.setItem('cerad_favorites_web', JSON.stringify(favorites));
      updateHeartBtn();
    }

    function updateHeartBtn() {
      const pages = getCatPages();
      const pageNum = pages[currentPageIdx];
      const btn = document.getElementById('heartBtn');
      btn.textContent = isFav(currentCategory.id, pageNum) ? '❤️' : '♡';
    }

    // Page navigation
    function showPage(page) {
      if (page === 'catalog') {
        document.getElementById('catalogPage').classList.remove('hidden');
        document.getElementById('favoritesPage').classList.remove('active');
        document.getElementById('navHome').classList.add('active');
        document.getElementById('navFav').classList.remove('active');
      } else {
        document.getElementById('catalogPage').classList.add('hidden');
        document.getElementById('favoritesPage').classList.add('active');
        document.getElementById('navHome').classList.remove('active');
        document.getElementById('navFav').classList.add('active');
        renderFavorites();
      }
    }

    function renderFavorites() {
      const grid = document.getElementById('favGrid');
      const empty = document.getElementById('emptyFav');
      grid.innerHTML = '';
      if (favorites.length === 0) {
        grid.style.display = 'none'; empty.style.display = 'block'; return;
      }
      grid.style.display = 'grid'; empty.style.display = 'none';

      favorites.forEach(pageId => {
        const parts = pageId.split('_');
        const pageNum = parseInt(parts.pop());
        const catId = parts.join('_');
        const cat = catalogData?.categories.find(c => c.id === catId);
        if (!cat) return;
        const pages = Array.isArray(cat.pages) ? cat.pages : [];
        const pageIdx = pages.indexOf(pageNum);
        if (pageIdx < 0) return;

        const item = document.createElement('div');
        item.className = 'fav-item';
        item.onclick = () => openViewer(cat, pageIdx);
        item.innerHTML = `
          <img src="${getImageUrl(pageNum)}" alt="${cat.name}" loading="lazy" />
          <span class="fav-badge">${cat.name} ${pageIdx + 1}p</span>`;
        grid.appendChild(item);
      });
    }

    loadCatalog();
  </script>
</body>
</html>
